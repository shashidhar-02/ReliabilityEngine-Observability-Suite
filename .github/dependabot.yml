version: 2
updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - github-actions

  # Terraform Root/Modules
  - package-ecosystem: "terraform"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - terraform

  # Terraform Prod Environment
  - package-ecosystem: "terraform"
    directory: "/terraform/env/prod"
    schedule:
      interval: "weekly"
    labels:
      - terraform
      - production

  # Terraform Staging Environment
  - package-ecosystem: "terraform"
    directory: "/terraform/env/staging"
    schedule:
      interval: "weekly"
    labels:
      - terraform
      - staging

  # Helm - Orders API
  - package-ecosystem: "helm"
    directory: "/src/orders-api/chart"
    schedule:
      interval: "weekly"
    labels:
      - helm

  # Helm - Payments API
  - package-ecosystem: "helm"
    directory: "/src/payments-api/chart"
    schedule:
      interval: "weekly"
    labels:
      - helm

  # Docker - Orders API
  - package-ecosystem: "docker"
    directory: "/src/orders-api"
    schedule:
      interval: "weekly"
    labels:
      - docker

  # Docker - Payments API
  - package-ecosystem: "docker"
    directory: "/src/payments-api"
    schedule:
      interval: "weekly"
    labels:
      - docker

  # Go - Orders API
  - package-ecosystem: "gomod"
    directory: "/src/orders-api"
    schedule:
      interval: "weekly"
    labels:
      - go

  # Python - Payments API
  - package-ecosystem: "pip"
    directory: "/src/payments-api"
    schedule:
      interval: "weekly"
    labels:
      - python
