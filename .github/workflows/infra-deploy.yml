name: Infrastructure Deployment (Terraform)

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
  pull_request:
    paths:
      - 'terraform/**'

permissions:
  id-token: write
  contents: read

jobs:
  validate-and-scan:
    name: Validate and Scan IaC
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.7.0"

      - name: Terraform Format
        run: terraform fmt -check -recursive terraform/

      - name: Install tflint
        run: |
          curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash

      - name: Run tflint
        run: |
          cd terraform/env/prod
          tflint --init
          tflint

      - name: Checkov IaC Scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          framework: terraform
          soft_fail: true

  plan:
    name: Terraform Plan
    needs: validate-and-scan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::123456789012:role/github-actions-tf-role
          aws-region: ap-south-1

      - name: Terraform Init (Prod)
        run: terraform -chdir=terraform/env/prod init

      - name: Terraform Plan (Prod)
        run: terraform -chdir=terraform/env/prod plan -no-color

  apply:
    name: Terraform Apply
    needs: validate-and-scan
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::123456789012:role/github-actions-tf-role
          aws-region: ap-south-1

      - name: Terraform Init (Prod)
        run: terraform -chdir=terraform/env/prod init

      - name: Terraform Apply (Prod)
        run: terraform -chdir=terraform/env/prod apply -auto-approve
